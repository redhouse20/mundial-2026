<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial FIFA 2026 - Red House</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- SVG Logo Watermark (Fondo) -->
    <svg class="watermark-svg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Llanta/Rueda -->
        <circle cx="200" cy="150" r="120" fill="none" stroke="#C00000" stroke-width="8" opacity="0.05"/>
        <circle cx="200" cy="150" r="110" fill="none" stroke="#C00000" stroke-width="2" opacity="0.05"/>
        <circle cx="200" cy="150" r="90" fill="none" stroke="#C00000" stroke-width="3" opacity="0.05"/>
        
        <!-- Centro de la rueda -->
        <circle cx="200" cy="150" r="40" fill="#C00000" opacity="0.03"/>
        <circle cx="200" cy="150" r="20" fill="none" stroke="#C00000" stroke-width="2" opacity="0.05"/>
        
        <!-- Aros decorativos -->
        <circle cx="200" cy="150" r="100" fill="none" stroke="#C00000" stroke-width="1" opacity="0.04" stroke-dasharray="5,5"/>
        
        <!-- Texto RED HOUSE -->
        <text x="200" y="160" font-size="48" font-weight="bold" text-anchor="middle" fill="#C00000" opacity="0.05" font-family="Arial, sans-serif" letter-spacing="2">RED HOUSE</text>
    </svg>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-section">
                <!-- SVG Logo en Header -->
                <svg class="logo-svg" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Llanta/Rueda -->
                    <defs>
                        <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#A0A0A0;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#606060;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <!-- Marco exterior -->
                    <circle cx="100" cy="100" r="85" fill="none" stroke="#000" stroke-width="4"/>
                    <circle cx="100" cy="100" r="80" fill="url(#wheelGrad)" stroke="#333" stroke-width="1"/>
                    
                    <!-- Tornillos alrededor -->
                    <g fill="#666">
                        <circle cx="100" cy="20" r="3"/>
                        <circle cx="141" cy="30" r="3"/>
                        <circle cx="170" cy="59" r="3"/>
                        <circle cx="180" cy="100" r="3"/>
                        <circle cx="170" cy="141" r="3"/>
                        <circle cx="141" cy="170" r="3"/>
                        <circle cx="100" cy="180" r="3"/>
                        <circle cx="59" cy="170" r="3"/>
                        <circle cx="30" cy="141" r="3"/>
                        <circle cx="20" cy="100" r="3"/>
                        <circle cx="30" cy="59" r="3"/>
                        <circle cx="59" cy="30" r="3"/>
                    </g>
                    
                    <!-- Centro de rueda -->
                    <circle cx="100" cy="100" r="25" fill="#888" stroke="#333" stroke-width="1"/>
                    <circle cx="100" cy="100" r="18" fill="#666"/>
                    
                    <!-- Radios/Espokes (4) -->
                    <line x1="100" y1="100" x2="100" y2="40" stroke="#444" stroke-width="3"/>
                    <line x1="100" y1="100" x2="160" y2="100" stroke="#444" stroke-width="3"/>
                    <line x1="100" y1="100" x2="100" y2="160" stroke="#444" stroke-width="3"/>
                    <line x1="100" y1="100" x2="40" y2="100" stroke="#444" stroke-width="3"/>
                    
                    <!-- Aberturas/Agujeros de la rueda (estilo tuning) -->
                    <ellipse cx="140" cy="60" rx="8" ry="12" fill="#000"/>
                    <ellipse cx="140" cy="140" rx="8" ry="12" fill="#000"/>
                    <ellipse cx="60" cy="60" rx="8" ry="12" fill="#000"/>
                    <ellipse cx="60" cy="140" rx="8" ry="12" fill="#000"/>
                    
                    <!-- Detalles de profundidad -->
                    <circle cx="100" cy="100" r="12" fill="none" stroke="#999" stroke-width="1"/>
                </svg>
                <div class="logo-text">
                    <div class="logo-main">RED HOUSE</div>
                    <div class="logo-sub">MUNDIAL 2026</div>
                </div>
            </div>
            <button id="btn-reset" class="btn-secondary">Restablecer Torneo</button>
        </div>
    </header>

    <main class="main-content">
        
        <section id="today-section" class="section-container hidden">
            <h2 class="section-title">Partidos de Hoy</h2>
            <div id="today-matches-grid" class="matches-grid"></div>
        </section>

        <nav class="phase-nav">
            <button class="nav-link active" data-target="fase-grupos">Fase de Grupos</button>
            <button class="nav-link" data-target="ronda-32">Dieciseisavos (R32)</button>
            <button class="nav-link" data-target="ronda-16">Octavos</button>
            <button class="nav-link" data-target="cuartos">Cuartos</button>
            <button class="nav-link" data-target="semis">Semis & Finales</button>
            <button class="nav-link" data-target="podio">Podio</button>
        </nav>

        <div id="fase-grupos" class="tab-content active">
            <div id="groups-container" class="groups-grid"></div>
        </div>

        <div id="ronda-32" class="tab-content">
            <h2 class="section-title">Dieciseisavos de Final (Round of 32)</h2>
            <div id="r32-grid" class="matches-grid elimination-grid"></div>
        </div>

        <div id="ronda-16" class="tab-content">
            <h2 class="section-title">Octavos de Final</h2>
            <div id="r16-grid" class="matches-grid elimination-grid"></div>
        </div>

        <div id="cuartos" class="tab-content">
            <h2 class="section-title">Cuartos de Final</h2>
            <div id="r8-grid" class="matches-grid elimination-grid"></div>
        </div>

        <div id="semis" class="tab-content">
            <div class="split-bracket">
                <div>
                    <h2 class="section-title">Semifinales</h2>
                    <div id="r4-grid" class="matches-grid elimination-grid"></div>
                </div>
                <div>
                    <h2 class="section-title">Tercer Puesto</h2>
                    <div id="r3_place-grid" class="matches-grid elimination-grid"></div>
                </div>
                <div>
                    <h2 class="section-title">Gran Final</h2>
                    <div id="r2-grid" class="matches-grid elimination-grid"></div>
                </div>
            </div>
        </div>

        <div id="podio" class="tab-content">
            <h2 class="section-title">Cuadro de Honor</h2>
            <div class="podium-container">
                <div class="podium-card subchampion">
                    <div class="position">2°</div>
                    <div class="flag" id="podium-2-flag">─</div>
                    <div class="name" id="podium-2-name">Subcampeón</div>
                </div>
                <div class="podium-card champion">
                    <div class="crown">👑</div>
                    <div class="position">1°</div>
                    <div class="flag" id="podium-1-flag">─</div>
                    <div class="name" id="podium-1-name">CAMPEÓN</div>
                </div>
                <div class="podium-card third">
                    <div class="position">3°</div>
                    <div class="flag" id="podium-3-flag">─</div>
                    <div class="name" id="podium-3-name">Tercer Puesto</div>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
